capital-x = "curly-serifless"
capital-y = "curly-serifless"
capital-z = "curly-serifless"
a = "single-storey-earless-rounded-serifed"
b = "toothless-rounded-serifless"
d = "toothless-rounded-serifless"
e = "rounded"
f = "tailed"
g = "single-storey-earless-corner"
i = "tailed"
j = "serifless"
k = "curly-top-left-serifed"
l = "flat-tailed"
m = "earless-corner-double-arch-serifless"
n = "earless-rounded-straight-serifless"
p = "earless-rounded-serifless"
q = "earless-corner-diagonal-tailed-serifless"
r = "earless-rounded-serifless"
u = "toothless-rounded-serifless"
x = "semi-chancery-curly-serifless"
y = "straight-turn-serifless"
z = "curly-serifless"
lower-eth = "curly-bar"
capital-gamma = "serifless"
lower-eta = "earless-rounded-serifless"
lower-theta = "capsule"
lower-iota = "semi-tailed"
lower-lambda = "curly-tailed-turn"
lower-mu = "toothless-rounded-serifless"
lower-xi = "rounded"
lower-chi = "chancery"
cyrl-a = "single-storey-earless-rounded-serifed"
cyrl-ve = "standard-serifless"
cyrl-capital-zhe = "curly"
cyrl-zhe = "curly"
cyrl-capital-ka = "curly-serifless"
cyrl-ka = "curly-serifless"
cyrl-er = "earless-rounded-serifless"
cyrl-capital-u = "curly-turn-serifless"
